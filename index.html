<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Shop Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 15px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .product-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .product-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .product-price { color: #2ecc71; font-weight: bold; margin-bottom: 12px; }
        .buy-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .buy-btn:active { background: #2980b9; }
    </style>
</head>
<body>

    <h2>📱 Каталог Гаджетов</h2>

    <div class="product-grid">
        <div class="product-card">
            <div class="product-title">Google Pixel 7 8/128GB</div>
            <div class="product-price">11 200 грн</div>
            <button class="buy-btn" onclick="buyProduct('Google Pixel 7', 11200)">Купить</button>
        </div>
        
        <div class="product-card">
            <div class="product-title">Samsung S23 Ultra (Выгорание)</div>
            <div class="product-price">21 500 грн</div>
            <button class="buy-btn" onclick="buyProduct('Samsung S23 Ultra', 21500)">Купить</button>
        </div>
    </div>

    <script>
        // Инициализируем WebApp Телеграма
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение на весь экран телефона/компьютера

        function buyProduct(name, price) {
            // Передаем данные о покупке обратно в нашего Python-бота в виде JSON-строки
            const data = JSON.stringify({
                product_name: name,
                product_price: price
            });
            
            tg.sendData(data); // Эта команда закрывает WebApp и шлет данные боту
        }
    </script>
</body>
</html>
